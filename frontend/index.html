<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产线数字孪生3D看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #0a0a1a;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(10, 20, 40, 0.95) 0%, rgba(10, 20, 40, 0.7) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }
        
        .header .status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-tabs {
            display: flex;
            gap: 10px;
        }
        
        .tab-btn {
            background: rgba(0, 50, 100, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: #88aacc;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: rgba(0, 100, 180, 0.8);
            color: #fff;
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .tab-btn:hover {
            background: rgba(0, 100, 180, 0.6);
            color: #fff;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }
        
        .status-dot.disconnected {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .sidebar {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 320px;
            background: rgba(10, 20, 40, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            z-index: 100;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        
        .sidebar.hidden {
            display: none;
        }
        
        .sidebar h2 {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 255, 0.3);
        }
        
        .device-card {
            background: rgba(0, 50, 100, 0.3);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .device-card:hover {
            border-color: rgba(0, 150, 255, 0.5);
            background: rgba(0, 60, 120, 0.4);
        }
        
        .device-card h3 {
            color: #fff;
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .device-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .device-status.running { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .device-status.warning { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        .device-status.error { background: #ff4444; box-shadow: 0 0 8px #ff4444; animation: blink 0.5s infinite; }
        .device-status.idle { background: #6688aa; box-shadow: 0 0 8px #6688aa; }
        .device-status.offline { background: #444444; }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }
        
        .data-label {
            color: #88aacc;
        }
        
        .data-value {
            color: #fff;
            font-weight: bold;
        }
        
        .data-value.temp.high { color: #ff6666; }
        .data-value.temp.medium { color: #ffcc00; }
        .data-value.temp.normal { color: #66ff99; }
        
        .rule-card {
            background: rgba(0, 50, 100, 0.3);
            border: 1px solid rgba(0, 150, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .rule-name {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        
        .rule-toggle {
            width: 40px;
            height: 20px;
            background: #444;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        
        .rule-toggle.active {
            background: #00aaff;
        }
        
        .rule-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        
        .rule-toggle.active::after {
            left: 22px;
        }
        
        .rule-details {
            font-size: 12px;
            color: #88aacc;
        }
        
        .rule-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .rule-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .rule-btn.edit {
            background: rgba(0, 150, 255, 0.3);
            color: #00d4ff;
        }
        
        .rule-btn.delete {
            background: rgba(255, 68, 68, 0.3);
            color: #ff6666;
        }
        
        .add-rule-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 150, 255, 0.3);
            border: 1px dashed rgba(0, 150, 255, 0.5);
            border-radius: 8px;
            color: #00d4ff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .add-rule-btn:hover {
            background: rgba(0, 150, 255, 0.5);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.hidden {
            display: none;
        }
        
        .modal-content {
            background: rgba(10, 20, 40, 0.98);
            border: 1px solid rgba(0, 150, 255, 0.5);
            border-radius: 10px;
            padding: 25px;
            width: 400px;
        }
        
        .modal h3 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #88aacc;
            margin-bottom: 5px;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 50, 100, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-btn.cancel {
            background: rgba(100, 100, 100, 0.5);
            color: #ccc;
        }
        
        .modal-btn.save {
            background: rgba(0, 150, 255, 0.8);
            color: #fff;
        }
        
        .timeline-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 900px;
            background: rgba(10, 20, 40, 0.95);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px 25px;
            z-index: 100;
        }
        
        .timeline-container.hidden {
            display: none;
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .timeline-title {
            color: #00d4ff;
            font-size: 14px;
            font-weight: bold;
        }
        
        .playback-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.8);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .play-btn:hover {
            background: rgba(0, 200, 255, 1);
            transform: scale(1.1);
        }
        
        .speed-select {
            background: rgba(0, 50, 100, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .current-time {
            color: #fff;
            font-size: 13px;
            min-width: 120px;
            text-align: center;
        }
        
        .timeline-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(0, 50, 100, 0.5);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }
        
        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #88aacc;
            font-size: 11px;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            border-radius: 20px;
            color: #00ff88;
            font-size: 12px;
        }
        
        .live-indicator .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        .live-indicator.playback {
            background: rgba(255, 170, 0, 0.2);
            border-color: rgba(255, 170, 0, 0.5);
            color: #ffaa00;
        }
        
        .live-indicator.playback .dot {
            background: #ffaa00;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            background: rgba(0, 50, 100, 0.8);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .control-btn:hover {
            background: rgba(0, 100, 180, 0.8);
            border-color: rgba(0, 200, 255, 0.8);
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.9);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px 30px;
            z-index: 90;
            display: flex;
            gap: 40px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-value {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
        
        .info-label {
            color: #88aacc;
            font-size: 12px;
            margin-top: 5px;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 50, 100, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 150, 255, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        
        <div class="header">
            <h1>🏭 产线数字孪生3D看板</h1>
            <div class="header-tabs">
                <button class="tab-btn active" onclick="switchTab('devices')">📊 设备数据</button>
                <button class="tab-btn" onclick="switchTab('rules')">⚙️ 报警规则</button>
            </div>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot" id="ws-status"></div>
                    <span id="ws-status-text">连接中...</span>
                </div>
                <div class="status-item">
                    <span>OPC UA: </span>
                    <span id="opcua-status">连接中...</span>
                </div>
            </div>
        </div>
        
        <div class="sidebar" id="devices-panel">
            <h2>📊 设备实时数据</h2>
            <div id="device-list"></div>
        </div>
        
        <div class="sidebar hidden" id="rules-panel">
            <h2>⚙️ 报警规则配置</h2>
            <div id="rules-list"></div>
            <button class="add-rule-btn" onclick="openRuleModal()">+ 添加新规则</button>
        </div>
        
        <div class="timeline-container" id="timeline-container">
            <div class="timeline-header">
                <div class="timeline-title">⏱️ 历史数据回放</div>
                <div class="playback-controls">
                    <div class="live-indicator" id="live-indicator">
                        <div class="dot"></div>
                        <span>实时模式</span>
                    </div>
                    <button class="play-btn" id="play-btn" onclick="togglePlayback()">▶️</button>
                    <select class="speed-select" id="speed-select" onchange="changePlaybackSpeed()">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                        <option value="5">5x</option>
                        <option value="10">10x</option>
                    </select>
                    <span class="current-time" id="current-time">--:--:--</span>
                </div>
            </div>
            <input type="range" class="timeline-slider" id="timeline-slider" min="0" max="100" value="100" oninput="seekTimeline(this.value)">
            <div class="timeline-labels">
                <span id="time-start">--:--:--</span>
                <span id="time-end">--:--:--</span>
            </div>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="toggleRotation()">🔄 自动旋转</button>
            <button class="control-btn" onclick="resetCamera()">🎯 重置视角</button>
            <button class="control-btn" onclick="toggleWireframe()">📐 线框模式</button>
            <button class="control-btn" onclick="toggleTimeline()">⏱️ 时间轴</button>
        </div>
        
        <div class="info-panel">
            <div class="info-item">
                <div class="info-value" id="total-output">0</div>
                <div class="info-label">今日总产量</div>
            </div>
            <div class="info-item">
                <div class="info-value" id="avg-temp">0°C</div>
                <div class="info-label">平均温度</div>
            </div>
            <div class="info-item">
                <div class="info-value" id="running-devices">0/0</div>
                <div class="info-label">运行设备</div>
            </div>
            <div class="info-item">
                <div class="info-value" id="update-time">--:--:--</div>
                <div class="info-label">数据更新时间</div>
            </div>
        </div>
        
        <div class="modal hidden" id="rule-modal">
            <div class="modal-content">
                <h3 id="modal-title">添加报警规则</h3>
                <div class="form-group">
                    <label>规则名称</label>
                    <input type="text" id="rule-name" placeholder="例如：温度过高报警">
                </div>
                <div class="form-group">
                    <label>目标设备</label>
                    <select id="rule-device">
                        <option value="all">所有设备</option>
                        <option value="CNC-001">CNC加工中心-001</option>
                        <option value="CNC-002">CNC加工中心-002</option>
                        <option value="ROBOT-001">工业机器人-001</option>
                        <option value="CONVEYOR-001">输送带-001</option>
                        <option value="AGV-001">AGV小车-001</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>监控指标</label>
                    <select id="rule-node">
                        <option value="temperature">温度</option>
                        <option value="speed">转速</option>
                        <option value="output">产量</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>触发条件</label>
                    <select id="rule-condition">
                        <option value=">">大于 (>)</option>
                        <option value=">=">大于等于 (>=)</option>
                        <option value="<">小于 (<)</option>
                        <option value="<=">小于等于 (<=)</option>
                        <option value="==">等于 (==)</option>
                        <option value="!=">不等于 (!=)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>阈值</label>
                    <input type="number" id="rule-threshold" placeholder="例如：80">
                </div>
                <div class="form-group">
                    <label>报警级别</label>
                    <select id="rule-level">
                        <option value="info">信息</option>
                        <option value="warning">警告</option>
                        <option value="error">错误</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>报警消息</label>
                    <input type="text" id="rule-message" placeholder="{deviceName} 温度过高: {value}°C">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" onclick="closeRuleModal()">取消</button>
                    <button class="modal-btn save" onclick="saveRule()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/devices.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
